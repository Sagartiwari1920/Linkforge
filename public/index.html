<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkForge - Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-screen">
    <div class="auth-shell" style="flex-direction: column; align-items: center; justify-content: center; padding: 4rem; text-align: center; max-width: 600px; margin: auto;">
      <div class="brand-mark" style="justify-content: center;">
        <span class="chevron">›</span><span class="chevron">›</span><span class="chevron">›</span>
      </div>
      <h1 class="brand-title">LinkForge</h1>
      <p class="brand-tag">Forge short links. Track every click.</p>
      
      <div style="display: flex; gap: 15px; margin-top: 30px; width: 100%; max-width: 300px;">
        <a href="login.html" class="btn btn-primary" style="flex: 1; text-align: center; text-decoration: none;">Sign In</a>
        <a href="register.html" class="btn btn-ghost" style="flex: 1; text-align: center; text-decoration: none; border: 1px solid var(--border);">Sign Up</a>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
